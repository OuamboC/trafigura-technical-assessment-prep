<script>
// Load data from JSON block - zero escaping issues
const RAW = JSON.parse(document.getElementById('data-json').textContent);
const QUESTIONS = RAW.questions;
const NEETCODE = RAW.neetcode;
const NC_PATTERNS = ['all','Arrays & Hashing','Two Pointers','Sliding Window','Stack','Binary Search','Linked List','Trees','Dynamic Programming','Graphs','Heap','Backtracking','Trie','Intervals','Bit Manipulation','Math / Matrix','String'];
const TOPIC_LABELS = {sql:'SQL',python:'Python 3',git:'Git',java:'Java'};

let state = {
  page:'sql', idx:0, answered:{}, ncSolved:{}, ncFilter:'all', ncSearch:'',
  openCard:null, timerOn:false, timeLeft:3600, timerInterval:null,
  stats:{done:0,correct:0,wrong:0}
};

function loadState(){
  const s = localStorage.getItem('tfprep_v3');
  if(s){const d=JSON.parse(s);state.answered=d.answered||{};state.ncSolved=d.ncSolved||{};state.stats=d.stats||{done:0,correct:0,wrong:0};updateStats();}
}
function saveState(){localStorage.setItem('tfprep_v3',JSON.stringify({answered:state.answered,ncSolved:state.ncSolved,stats:state.stats}));}
function updateStats(){
  document.getElementById('s-done').textContent=state.stats.done;
  document.getElementById('s-correct').textContent=state.stats.correct;
  document.getElementById('s-wrong').textContent=state.stats.wrong;
  const acc=state.stats.done>0?Math.round(state.stats.correct/state.stats.done*100):0;
  document.getElementById('s-acc').textContent=state.stats.done>0?acc+'%':'—';
  document.getElementById('acc-fill').style.width=acc+'%';
  const solved=Object.values(state.ncSolved).filter(Boolean).length;
  document.getElementById('cnt-neetcode').textContent=solved+'/75';
}
function nav(page){
  state.page=page;state.idx=0;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  render();
}
function render(){
  if(state.page==='neetcode'){renderNC();return;}
  if(state.page==='coding'){renderDrill();return;}
  renderMCQ();
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

// ── MCQ ──────────────────────────────────────────────────────────────────────
// Per-question timer state
let qt = { on:false, left:0, total:0, interval:null, startTs:0 };
const QT_LIMITS = { easy:45, medium:90, hard:120 };  // MCQ limits (seconds)
const QT_LIMITS_CODING = { easy:600, medium:1200, hard:1800 };  // Coding limits (seconds)
function qtLimits() {
  return state.page === 'coding' ? QT_LIMITS_CODING : QT_LIMITS;
}

function qtStart(q) {
  if(!qt.on) return;
  qtStop();
  qt.total = qtLimits()[q.diff] || 60;
  qt.left = qt.total;
  qt.startTs = Date.now();
  qtUpdateBar();
  qt.interval = setInterval(() => {
    qt.left--;
    qtUpdateBar();
    if(qt.left <= 0) {
      qtStop();
      if(state.page === 'coding') {
        const cq = QUESTIONS.coding[state.idx];
        if(!state.answered['d_'+cq.id]) {
          state.answered['d_'+cq.id] = { correct:false, timeout:true };
          state.stats.done++; state.stats.wrong++;
          saveState(); updateStats(); renderDrill();
        }
      } else {
        // MCQ auto-mark as timeout
        const mq = QUESTIONS[state.page][state.idx];
        if(!state.answered[mq.id]) {
          state.answered[mq.id] = { sel:-1, correct:false, timeout:true };
          state.stats.done++; state.stats.wrong++;
          saveState(); updateStats(); render();
        }
      }
    }
  }, 1000);
}
function qtStop() {
  if(qt.interval) { clearInterval(qt.interval); qt.interval=null; }
}
function qtUpdateBar() {
  const bar = document.getElementById('qtBar');
  const time = document.getElementById('qtTime');
  if(!bar||!time) return;
  const pct = Math.max(0, (qt.left / qt.total) * 100);
  bar.style.width = pct + '%';
  const color = qt.left <= qt.total*0.1 ? 'var(--dan)' : qt.left <= qt.total*0.3 ? 'var(--warn)' : 'var(--acc)';
  bar.style.background = color;
  // show mm:ss for coding, plain seconds for MCQ
  if(state.page === 'coding') {
    const m = Math.floor(qt.left/60).toString().padStart(2,'0');
    const s = (qt.left%60).toString().padStart(2,'0');
    time.textContent = m+':'+s;
  } else {
    time.textContent = qt.left + 's';
  }
  time.className = 'qt-time' + (qt.left<=qt.total*0.1?' crit': qt.left<=qt.total*0.3?' warn':'');
}
function qtToggle() {
  qt.on = !qt.on;
  const qs = state.page==='coding' ? QUESTIONS.coding : QUESTIONS[state.page];
  const q = qs[state.idx];
  if(qt.on && !state.answered[q.id] && !state.answered['d_'+q.id]) qtStart(q);
  else qtStop();
  render();
}

function renderMCQ(){
  const qs=QUESTIONS[state.page], q=qs[state.idx];
  const pct=Math.round((state.idx+1)/qs.length*100);
  const ans=state.answered[q.id];
  const lbl=['A','B','C','D'];
  const timer=state.timerOn?`<div class="timer-el${state.timeLeft<300?' warn':''}" id="timerEl">${fmt(state.timeLeft)}</div>`:'';
  
  // time taken badge
  let splitBadge = '';
  if(ans && ans.timeTaken !== undefined) {
    const limit = QT_LIMITS[q.diff];
    const cls = ans.timeTaken <= limit*0.6 ? 'fast' : ans.timeTaken > limit ? 'slow' : '';
    splitBadge = `<span class="qt-split ${cls}">${ans.timeTaken}s</span>`;
  } else if(ans && ans.timeout) {
    splitBadge = `<span class="qt-expired">⏱ timed out</span>`;
  }

  // per-q timer — always show full clock widget
  const mcqLimit = QT_LIMITS[q.diff] || 60;
  const mcqDisplayTime = qt.on && qt.left ? qt.left+'s' : mcqLimit+'s';
  const mcqBarPct = qt.on && qt.left ? Math.max(0,(qt.left/mcqLimit)*100) : 100;
  const mcqBarColor = (qt.on && qt.left <= mcqLimit*0.1) ? 'var(--dan)' : (qt.on && qt.left <= mcqLimit*0.3) ? 'var(--warn)' : 'var(--acc)';

  const qtRow = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf2);border-radius:5px;border:1px solid var(--bdr);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px">
        <div>
          <div style="font-size:9px;color:var(--mut);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Per question</div>
          <span style="font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${(qt.on&&qt.left<=mcqLimit*0.1)?'var(--dan)':(qt.on&&qt.left<=mcqLimit*0.3)?'var(--warn)':'var(--acc)'}" id="qtTime">${mcqDisplayTime}</span>
        </div>
        <div style="width:100px">
          <div style="height:3px;background:var(--bdr);border-radius:2px;overflow:hidden">
            <div id="qtBar" style="height:3px;width:${mcqBarPct}%;background:${mcqBarColor};border-radius:2px;transition:width 1s linear,background .5s"></div>
          </div>
          <div style="font-size:9px;color:var(--mut);font-family:'IBM Plex Mono',monospace;margin-top:3px">limit: ${mcqLimit}s · ${q.diff}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${ans && ans.timeTaken !== undefined ? `<span class="qt-split ${ans.timeTaken<=mcqLimit*0.6?'fast':ans.timeTaken>mcqLimit?'slow':''}">${ans.timeTaken}s taken</span>` : ''}
        ${ans && ans.timeout ? '<span class="qt-expired">⏱ timed out</span>' : ''}
        ${!ans ? `<button class="qt-toggle${qt.on?' on':''}" onclick="qtToggle()" style="padding:5px 14px">${qt.on?'⏸ Pause':'▶ Start'}</button>` : ''}
      </div>
    </div>`;

  document.getElementById('mainArea').innerHTML=`
    <div class="hdr-row pg-hdr">
      <div><h2>${TOPIC_LABELS[state.page]} — MCQ Practice</h2><p>Assessment-style questions with instant explanations</p></div>
      <div style="text-align:right">${timer}<div class="mode-btns"><button class="mode-btn${!state.timerOn?' active':''}" onclick="setTimer(false)">Practice</button><button class="mode-btn${state.timerOn?' active':''}" onclick="setTimer(true)">Timed 60min</button></div></div>
    </div>
    <div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${state.idx+1}/${qs.length}</span></div>
    <div class="q-card">
      <div class="q-hdr"><span class="q-num">Q${state.idx+1}</span><span class="dbadge ${q.diff}">${q.diff}</span><span class="topic-badge">${TOPIC_LABELS[state.page]}</span></div>
      ${qtRow}
      <div class="q-txt">${q.text}</div>
      ${q.code?`<div class="code-blk">${esc(q.code)}</div>`:''}
      <div class="opts">${q.opts.map((o,i)=>{
        let c='';
        if(ans){if(i===q.ans)c='correct reveal';else if(i===ans.sel&&i!==q.ans)c='wrong';c+=' locked';}
        return `<div class="opt ${c}" onclick="${ans?'':'pick('+i+')'}">${'<div class="opt-key">'+lbl[i]+'</div>'}<div class="opt-txt">${o}</div></div>`;
      }).join('')}</div>
      ${ans?`<div class="exp"><div class="exp-title">Explanation</div><div class="exp-txt">${q.exp}</div></div>`:''}
      <div class="nav-row">
        <button class="btn" onclick="prevQ()" ${state.idx===0?'disabled':''}>← Prev</button>
        <button class="btn primary" onclick="nextQ()" ${state.idx===qs.length-1?'disabled':''}>Next →</button>
      </div>
    </div>`;
  
  // kick off timer after render
  if(qt.on && !ans) {
    if(!qt.interval) qtStart(q);
    else qtUpdateBar();
  }
}
function pick(sel){
  const q=QUESTIONS[state.page][state.idx];
  if(state.answered[q.id])return;
  const ok=sel===q.ans;
  const timeTaken = qt.on && qt.startTs ? Math.round((Date.now()-qt.startTs)/1000) : undefined;
  qtStop();
  state.answered[q.id]={sel,correct:ok,timeTaken};
  state.stats.done++;ok?state.stats.correct++:state.stats.wrong++;
  saveState();updateStats();render();
}
function prevQ(){
  qtStop(); qt.interval=null; qt.left=0;
  if(state.idx>0){state.idx--;render();}
}
function nextQ(){
  qtStop(); qt.interval=null; qt.left=0;
  if(state.idx<QUESTIONS[state.page].length-1){state.idx++;render();}
}

// ── NEETCODE ─────────────────────────────────────────────────────────────────
function renderNC(){
  const solved=Object.values(state.ncSolved).filter(Boolean).length;
  const filtered=NEETCODE.filter(p=>{
    const pm=state.ncFilter==='all'||p.pattern===state.ncFilter;
    const sm=!state.ncSearch||p.title.toLowerCase().includes(state.ncSearch.toLowerCase());
    return pm&&sm;
  });
  document.getElementById('mainArea').innerHTML=`
    <div class="pg-hdr"><h2>NeetCode Blind 75</h2><p>All 75 problems with Python approach — click any card to expand and study</p></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--mut)">Progress:</div>
      <div class="prog-track" style="flex:1;max-width:280px"><div class="prog-fill" style="width:${Math.round(solved/75*100)}%"></div></div>
      <span style="font-size:11px;color:var(--acc);font-family:'IBM Plex Mono',monospace">${solved}/75</span>
    </div>
    <div class="filter-row">
      <input type="text" class="srch" placeholder="Search problems..." oninput="ncSearch(this.value)" value="${state.ncSearch}">
      ${NC_PATTERNS.map(p=>`<button class="f-btn${state.ncFilter===p?' active':''}" onclick="ncFilter('${p}')">${p==='all'?'All':p}</button>`).join('')}
    </div>
    <div class="nc-grid">${filtered.map(p=>ncCard(p)).join('')}</div>`;
}
function ncCard(p){
  const sol=state.ncSolved[p.id];
  const open=state.openCard===p.id;
  return `<div class="nc-card${open?' open':''}" id="ncc-${p.id}">
    <div onclick="toggleNC('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="nc-title">${p.title}</div>
        <span class="nc-lc">#${p.lc}</span>
      </div>
      <div class="nc-meta">
        <span class="dbadge ${p.diff}" style="font-size:8px;padding:1px 5px">${p.diff}</span>
        <span class="nc-pat">${p.pattern}</span>
        ${sol?'<span class="nc-solved-badge">✓ solved</span>':''}
      </div>
    </div>
    <div class="nc-detail">
      <div class="nc-desc">${p.desc}</div>
      <div class="nc-approach">${esc(p.approach)}</div>
      <div class="nc-actions">
        <a href="https://leetcode.com/problems/${p.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-$/,'/')||'/'}" target="_blank" class="nc-link">↗ LeetCode</a>
        <button class="btn${sol?'':' primary'}" style="padding:4px 12px;font-size:10px" onclick="toggleSolved('${p.id}')">${sol?'✓ Solved':'Mark Solved'}</button>
      </div>
    </div>
  </div>`;
}
function toggleNC(id){state.openCard=state.openCard===id?null:id;renderNC();}
function toggleSolved(id){state.ncSolved[id]=!state.ncSolved[id];saveState();updateStats();renderNC();}
function ncFilter(f){state.ncFilter=f;renderNC();}
function ncSearch(v){state.ncSearch=v;renderNC();}

// ── CODING DRILLS ────────────────────────────────────────────────────────────
function renderDrill(){
  const qs=QUESTIONS.coding, q=qs[state.idx];
  const pct=Math.round((state.idx+1)/qs.length*100);
  const starter=q.starter.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  const done = state.answered['d_'+q.id];
  const limit = QT_LIMITS_CODING[q.diff];
  const limitLabel = q.diff==='easy' ? '10 min' : q.diff==='medium' ? '20 min' : '30 min';

  // time taken badge for coding
  let splitBadge = '';
  if(done && done.timeTaken !== undefined) {
    const m = Math.floor(done.timeTaken/60), s = done.timeTaken%60;
    const timeStr = m>0 ? m+'m '+s+'s' : s+'s';
    const cls = done.timeTaken <= limit*0.5 ? 'fast' : done.timeTaken > limit*0.8 ? 'slow' : '';
    splitBadge = `<span class="qt-split ${cls}">${timeStr}</span>`;
  } else if(done && done.timeout) {
    splitBadge = `<span class="qt-expired">⏱ timed out</span>`;
  }

  // per-q timer row
  const codingLimitSec = QT_LIMITS_CODING[q.diff] || 600;
  const initMmSs = q.diff==='easy'?'10:00':q.diff==='medium'?'20:00':'30:00';
  const codingTimeStr = qt.on && qt.left
    ? (Math.floor(qt.left/60).toString().padStart(2,'0')+':'+(qt.left%60).toString().padStart(2,'0'))
    : initMmSs;
  const codingBarPct = qt.on && qt.left ? Math.max(0,(qt.left/codingLimitSec)*100) : 100;
  const codingBarColor = (qt.on&&qt.left<=codingLimitSec*0.1)?'var(--dan)':(qt.on&&qt.left<=codingLimitSec*0.3)?'var(--warn)':'var(--acc)';

  const qtRow = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf2);border-radius:5px;border:1px solid var(--bdr);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px">
        <div>
          <div style="font-size:9px;color:var(--mut);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Per question</div>
          <span style="font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${(qt.on&&qt.left<=codingLimitSec*0.1)?'var(--dan)':(qt.on&&qt.left<=codingLimitSec*0.3)?'var(--warn)':'var(--acc)'}" id="qtTime">${codingTimeStr}</span>
        </div>
        <div style="width:120px">
          <div style="height:3px;background:var(--bdr);border-radius:2px;overflow:hidden">
            <div id="qtBar" style="height:3px;width:${codingBarPct}%;background:${codingBarColor};border-radius:2px;transition:width 1s linear,background .5s"></div>
          </div>
          <div style="font-size:9px;color:var(--mut);font-family:'IBM Plex Mono',monospace;margin-top:3px">limit: ${limitLabel} · ${q.diff}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${done && done.timeTaken !== undefined ? `<span class="qt-split ${done.timeTaken<=codingLimitSec*0.5?'fast':done.timeTaken>codingLimitSec*0.8?'slow':''}">${Math.floor(done.timeTaken/60)}m ${done.timeTaken%60}s taken</span>` : ''}
        ${done && done.timeout ? '<span class="qt-expired">⏱ timed out</span>' : ''}
        ${!done ? `<button class="qt-toggle${qt.on?' on':''}" onclick="qtToggle()" style="padding:5px 14px">${qt.on?'⏸ Pause':'▶ Start'}</button>` : ''}
      </div>
    </div>`;

  document.getElementById('mainArea').innerHTML=`
    <div class="pg-hdr"><h2>Coding Drills</h2><p>Python problems that mirror the Trafigura assessment format</p></div>
    <div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${state.idx+1}/${qs.length}</span></div>
    <div class="q-card">
      <div class="q-hdr"><span class="q-num">Q${state.idx+1}</span><span class="dbadge ${q.diff}">${q.diff}</span></div>
      ${qtRow}
      <div class="q-txt">${q.text}</div>
      <textarea class="code-editor" id="codeEd">${esc(q.starter)}</textarea>
      <div class="hint-box">💡 ${q.hint}</div>
      <div class="coding-btns">
        <button class="btn primary" onclick="checkCode()">▶ Check Approach</button>
        <button class="btn" onclick="document.getElementById('codeEd').value=\`${starter}\`">↺ Reset</button>
      </div>
      <div class="test-results" id="testRes"></div>
      <div class="nav-row">
        <button class="btn" onclick="prevQ()" ${state.idx===0?'disabled':''}>← Prev</button>
        <button class="btn primary" onclick="nextQ()" ${state.idx===qs.length-1?'disabled':''}>Next →</button>
      </div>
    </div>`;

  // restart timer after render
  if(qt.on && !done) {
    if(!qt.interval) qtStart(q);
    else qtUpdateBar();
  }
}
function checkCode(){
  const q=QUESTIONS.coding[state.idx];
  const code=document.getElementById('codeEd').value;
  const res=document.getElementById('testRes');
  res.innerHTML='<div style="color:var(--mut);font-size:11px;padding:6px">Running...</div>';
  setTimeout(()=>{
    const hasFn=code.includes('def '+q.fn);
    const hasRet=code.includes('return');
    const isPass=code.trim().endsWith('pass');
    const hints={sum_even:['%','sum','for','even'],first_unique_char:['dict','Counter','count','for'],two_sum:['dict','{','seen','target'],is_palindrome:['isalnum','lower','reverse','[::-1]'],longest_common_prefix:['sort','for','zip','min']};
    let html='';
    if(!hasFn||!hasRet||isPass){html=`<div class="tc fail">✗ Add your implementation and a return statement</div>`;}
    else{
      const usesPattern=(hints[q.fn]||[]).some(kw=>code.includes(kw));
      if(usesPattern){
        html+=`<div class="tc pass">✓ Function defined correctly</div>`;
        html+=`<div class="tc pass">✓ Pattern recognition looks right</div>`;
        html+=`<div class="tc pass">✓ Return statement present</div>`;
        if(!state.answered['d_'+q.id]){
          const timeTaken = qt.on && qt.startTs ? Math.round((Date.now()-qt.startTs)/1000) : undefined;
          qtStop();
          state.answered['d_'+q.id]={correct:true,timeTaken};
          state.stats.done++;state.stats.correct++;saveState();updateStats();renderDrill();}
      } else {
        html+=`<div class="tc pass">✓ Function structure OK</div>`;
        html+=`<div class="tc fail">✗ Try a different approach — check the NeetCode section for pattern hints</div>`;
      }
    }
    res.innerHTML=html;
  },350);
}

// ── TIMER ────────────────────────────────────────────────────────────────────
function setTimer(on){
  state.timerOn=on;
  if(!on&&state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  if(on&&!state.timerInterval){
    state.timeLeft=3600;
    state.timerInterval=setInterval(()=>{
      state.timeLeft--;
      const el=document.getElementById('timerEl');
      if(el){el.textContent=fmt(state.timeLeft);el.className='timer-el'+(state.timeLeft<300?' warn':'');}
      if(state.timeLeft<=0){clearInterval(state.timerInterval);state.timerInterval=null;alert("Time\'s up!");}
    },1000);
  }
  render();
}
function fmt(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');}

// Floating timer (works across all sections)
function startFloatTimer(){
  document.getElementById('ftStart').classList.add('hidden');
  document.getElementById('ftRunning').classList.remove('hidden');
  state.timeLeft=3600;
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    state.timeLeft--;
    const disp=document.getElementById('ftDisplay');
    const box=document.getElementById('ftRunning');
    if(disp){
      disp.textContent=fmt(state.timeLeft);
      disp.className='ft-time'+(state.timeLeft<300?' warn':'');
      box.className='float-timer'+(state.timeLeft<300?' warn':'');
    }
    if(state.timeLeft<=0){
      clearInterval(state.timerInterval);
      state.timerInterval=null;
      document.getElementById('ftRunning').classList.add('hidden');
      document.getElementById('ftStart').classList.remove('hidden');
      showTimeUp();
    }
  },1000);
}
function stopFloatTimer(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
  document.getElementById('ftRunning').classList.add('hidden');
  document.getElementById('ftStart').classList.remove('hidden');
  document.getElementById('ftDisplay').textContent='60:00';
}
function showTimeUp(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--surf);border:1px solid var(--dan);border-radius:8px;padding:32px 40px;text-align:center;max-width:360px">
    <div style="font-size:32px;margin-bottom:12px">⏱</div>
    <div style="font-size:18px;font-weight:600;color:var(--dan);font-family:'IBM Plex Mono',monospace;margin-bottom:8px">TIME\'S UP!</div>
    <div style="font-size:13px;color:var(--mut);margin-bottom:20px">In the real assessment your answers would be auto-submitted. In a real 60-min test, aim to do all MCQ sections first, then tackle the coding question with remaining time.</div>
    <button onclick="this.parentElement.parentElement.remove()" style="padding:8px 20px;border-radius:4px;border:1px solid var(--acc);background:rgba(0,212,170,.08);color:var(--acc);cursor:pointer;font-family:\'IBM Plex Mono\',monospace;font-size:12px">Continue Practising</button>
  </div>`;
  document.body.appendChild(overlay);
}

// ── RESET ────────────────────────────────────────────────────────────────────
function resetAll(){if(confirm('Reset all progress?')){state.answered={};state.ncSolved={};state.stats={done:0,correct:0,wrong:0};saveState();updateStats();render();}}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadState();render();
</script>
</body>
</html>
